name: ci

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Race tests
        run: go test -race ./...

      - name: Vulnerability check
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.26.x"
          go-package: ./...

      # go test -fuzz accepts only a single package with a single matching
      # target, so enumerate packages and fuzz targets explicitly.
      - name: Short fuzz smoke
        run: |
          for pkg in $(go list ./...); do
            for target in $(go test -list '^Fuzz' "$pkg" | grep '^Fuzz' || true); do
              go test -run='^$' -fuzz="^${target}\$" -fuzztime=5s "$pkg"
            done
          done
